<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Submitted Results — Admin</title>
  <link rel="stylesheet" href="results.css">
</head>
<body>
  <header class="top">
    <h1>Submitted Results</h1>
    <div class="auth-area" id="authArea"></div>
  </header>

  <!-- Mobile-only banner advising desktop view -->
  <div id="mobileBanner" class="mobile-banner" role="dialog" aria-live="polite">
    <div class="mobile-banner-inner">
      <div class="mobile-banner-text">
        For the best experience use <strong>Desktop View</strong>.
        On Android Chrome: open the browser menu and enable "Desktop site".
        On iOS Safari: tap the Share button and choose "Request Desktop Site".
      </div>
      <button id="mobileBannerClose" class="mobile-banner-close" aria-label="Dismiss">Got it</button>
    </div>
  </div>

  <main class="container">
    <section class="controls">
      <div class="searches">
        <input type="text" id="searchName" placeholder="Search by student name">
        <input type="text" id="searchRoll" placeholder="Search by roll number">
        <select id="sortOrder">
          <option value="desc">Sort: Newest</option>
          <option value="asc">Sort: Oldest</option>
        </select>
      </div>
      <div class="actions">
        <button id="exportCsv">Export CSV</button>
        <button id="exportExcel">Export Excel</button>
        <button id="exportPdf">Export PDF</button>
        <button id="refreshBtn">Refresh</button>
      </div>
    </section>

    <section id="tableArea" class="table-area">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Student Name</th>
            <th>Roll</th>
            <th>Program</th>
            <th>Semester GPA</th>
            <th>CGPA</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <div id="detailModal" class="modal hidden">
      <div class="modal-inner">
        <button class="close" id="closeDetail">Close</button>
        <div id="detailContent"></div>
      </div>
    </div>
  </main>

  <script type="module" src="results.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script>
  // Mobile banner dismiss logic (persist in localStorage)
  document.addEventListener('DOMContentLoaded', function(){
    try{
      const key = 'hideMobileBanner_v1';
      const banner = document.getElementById('mobileBanner');
      const close = document.getElementById('mobileBannerClose');
      if(!banner || !close) return;
      if(localStorage.getItem(key) === '1') { banner.style.display='none'; return; }
      close.addEventListener('click', ()=>{ localStorage.setItem(key,'1'); banner.style.display='none'; });
    }catch(e){/* ignore */}
  });
  </script>
</body>
</html>
